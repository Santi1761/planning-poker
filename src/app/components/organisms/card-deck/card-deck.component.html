<div class="deck-container">

  <h3 class="deck-title">Elige una carta 👇</h3>

  <div *ngIf="isLoading" class="loading-state">
    Repartiendo cartas...
  </div>

  <div *ngIf="!isLoading && cards.length === 0" class="empty-state">
    No hay cartas registradas
  </div>

  <div *ngIf="!isLoading && cards.length > 0" class="cards-row">
    <app-score-card
      *ngFor="let card of cards"
      [value]="card"
      [isSelected]="selectedCard === card"
      (click)="onSelect(card)">
    </app-score-card>
  </div>

</div>

<div class="board-container">
  <header class="board-header">
    <div class="header-left">
      <img src="logo-poker.png" alt="Logo" class="logo">
    </div>

    <div class="header-center">
      <h1 class="sprint-title">{{ gameName }}</h1>
    </div>

    <div class="header-right">
      <div class="user-badge">{{ userInitials }}</div>
      <button class="invite-btn">Invitar jugadores</button>
    </div>
  </header>

  <main class="board-main" style="position: relative;">
    <app-poker-table [players]="mockPlayers" [isRevealed]="isRevealed"></app-poker-table>

    <button
      class="reveal-btn"
      *ngIf="userRole === 'propietario' && !isRevealed"
      (click)="revealCards()">
      Revelar cartas
    </button>
  </main>

  <footer class="board-footer">
    <app-card-deck
      *ngIf="userViewMode === 'jugador' && !isRevealed"
      (cardSelected)="onCardSelected($event)">
    </app-card-deck>

    <app-vote-summary
      *ngIf="isRevealed"
      [players]="mockPlayers">
    </app-vote-summary>
  </footer>
</div>
